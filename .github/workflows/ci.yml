name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run regression tests
        run: node tests/openalex_quality.test.js

      - name: Check Apps Script syntax
        run: node --check < Code.gs

      - name: Validate JSON files
        run: node -e "const fs=require('fs'); ['appsscript.json','examples/directions.example.json'].forEach(f=>JSON.parse(fs.readFileSync(f,'utf8'))); console.log('json ok')"
